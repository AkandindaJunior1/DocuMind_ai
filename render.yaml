services:
  # 1. PostgreSQL + pgvector Database
  - type: pserv
    name: documind-db
    env: docker
    repo: https://github.com/ankane/pgvector
    region: ohio
    plan: starter
    disk:
      name: pgdata
      mountPath: /var/lib/postgresql/data
      sizeGB: 10
    envVars:
      - key: POSTGRES_DB
        value: documind
      - key: POSTGRES_USER
        value: postgres
      - key: POSTGRES_PASSWORD
        generateValue: true

  # 2. FastAPI Backend
  - type: web
    name: documind-api
    env: docker
    region: ohio
    plan: starter
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromService:
          type: pserv
          name: documind-db
          envVarKey: DATABASE_URL
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false # You must set this manually in the Render dashboard

  # 3. Vite + React Frontend
  - type: web
    name: documind-ui
    env: docker
    region: ohio
    plan: starter
    dockerfilePath: ./frontend/Dockerfile
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: documind-api
          envVarKey: RENDER_EXTERNAL_URL
