services:
  # 1. FastAPI Backend (Native Python - 100% FREE)
  - type: web
    name: documind-api
    env: python
    region: ohio
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false # Paste your database URL in Render UI
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false # Paste your Gemini API key in Render UI

  # 2. Vite + React Frontend (Static Site - 100% FREE)
  - type: static
    name: documind-ui
    region: ohio
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: documind-api
          envVarKey: RENDER_EXTERNAL_URL
