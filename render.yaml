services:
  # 1. FastAPI Backend (Native Python 3.11 - FREE)
  - type: web
    name: documind-api
    env: python
    region: ohio
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false

  # 2. Vite + React Frontend (Static Site - FREE)
  - type: web
    name: documind-ui
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: documind-api
          envVarKey: RENDER_EXTERNAL_URL
