services:
  # 1. FastAPI Backend (FREE plan)
  - type: web
    name: documind-api
    env: docker
    region: ohio
    plan: free
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: documind-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false # Set this in Render UI

  # 2. Vite + React Frontend (FREE static site)
  - type: web
    name: documind-ui
    env: docker
    region: ohio
    plan: free
    dockerfilePath: ./frontend/Dockerfile
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: documind-api
          envVarKey: RENDER_EXTERNAL_URL

databases:
  # 3. PostgreSQL Database (FREE trial)
  - name: documind-db
    databaseName: documind
    user: documind_user
    region: ohio
    plan: free
